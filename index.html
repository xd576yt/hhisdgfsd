<!DOCTYPE html>
<html>
<head>
<title>P2P Chat</title>

<style>

body{
font-family:Arial;
background:#1e1f22;
color:white;
margin:0;
}

#login{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
text-align:center;
}

#chat{
display:none;
height:100vh;
flex-direction:column;
}

#messages{
flex:1;
overflow:auto;
padding:10px;
}

.message{
background:#2b2d31;
margin:5px 0;
padding:8px;
border-radius:6px;
}

#inputArea{
display:flex;
padding:10px;
background:#111;
}

#messageInput{
flex:1;
padding:10px;
border:none;
border-radius:5px;
}

button{
padding:10px;
margin-left:5px;
background:#5865f2;
border:none;
color:white;
border-radius:5px;
}

#status{
font-size:12px;
color:#aaa;
padding:5px;
}

</style>

<script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>

</head>

<body>

<div id="login">

<h2>Enter Name</h2>

<input id="nameInput">

<button onclick="login()">Join</button>

</div>

<div id="chat">

<div id="status">Offline</div>

<div id="messages"></div>

<div id="inputArea">

<input id="messageInput" placeholder="Type message...">

<button onclick="sendMessage()">Send</button>

</div>

</div>

<script>

let username = localStorage.getItem("chatName");
let peer;
let connections=[];

if(username){
startChat();
}

function login(){

username=document.getElementById("nameInput").value;

if(!username)return;

localStorage.setItem("chatName",username);

startChat();

}

function startChat(){

document.getElementById("login").style.display="none";
document.getElementById("chat").style.display="flex";

peer=new Peer("global-chat-room");

peer.on("connection",conn=>{

connections.push(conn);

conn.on("data",receiveMessage);

});

document.getElementById("status").innerText="Online";

}

function receiveMessage(data){

addMessage(data.name+": "+data.text);

}

function sendMessage(){

let input=document.getElementById("messageInput");

if(!input.value)return;

let msg={
name:username,
text:input.value
};

connections.forEach(c=>c.send(msg));

addMessage("You: "+input.value);

input.value="";

}

function addMessage(text){

let div=document.createElement("div");

div.className="message";

div.innerText=text;

document.getElementById("messages").appendChild(div);

}

</script>

</body>
</html>
